<!--
    File: contact.html
    Purpose: Contact Us page for the company

    This page:
    - Provides information on how to contact the company
    - Includes a contact form for users to send messages
    - Explains the company's contact details and hours
    - Includes three buttons that run JavaScript when clicked

    Technologies used:
    - HTML: Page structure and text
    - CSS: Page styling (style.css)
    - JavaScript: Button interactivity (script.js)
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="test.html">Testimonials</a></li>
            <li><a href="order.html">Order Online</a></li>
            </ul>
        </nav>
    </header>
    
    <p id="today-date"></p>
    
    <main>
        <h1>Contact Us</h1>

        <form id="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="number">Contact Number:</label>
            <input type="tel" id="number" name="number" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea> 

            <button type="submit">Send Message</button>
        </form>

        <button onclick="showContactAlert()">Click Me</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
